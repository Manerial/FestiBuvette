name: ludo_pay_app
description: "Application de caisse mobile avec impression thermique Bluetooth."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local database (SQLite)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Date & number formatting
  intl: ^0.20.2

  # Persistent preferences (adresse imprimante, nom app…)
  shared_preferences: ^2.5.3

  # Bluetooth thermal printing
  print_bluetooth_thermal: ^1.2.2
  esc_pos_utils_plus: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  generate: true
  uses-material-design: true
