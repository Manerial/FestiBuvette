name: festi_buvette_app
description: "Application de caisse mobile avec impression thermique Bluetooth."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local database (SQLite)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Date & number formatting
  intl: ^0.20.2

  # Charts
  fl_chart: ^0.69.0

  # Persistent preferences (adresse imprimante, nom app…)
  shared_preferences: ^2.5.3

  # Bluetooth thermal printing
  print_bluetooth_thermal: ^1.2.2
  esc_pos_utils_plus: ^2.0.4

  # Runtime permissions (Bluetooth scan/connect on Android 12+, Bluetooth on iOS)
  permission_handler: ^11.3.0

  # Direct vibration (bypasses Android HAPTIC_FEEDBACK_ENABLED system setting)
  vibration: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "FestiBuvette.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "FestiBuvette.png"

flutter:
  generate: true
  uses-material-design: true
